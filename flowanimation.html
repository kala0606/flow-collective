<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Collective</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1A1752; }
    canvas { display: block; }

    #logo-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      width: 320px;
    }
    #logo-wrap svg {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
    }

    #controls {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(10, 8, 40, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px 20px;
      color: #ccc;
      font: 12px/1.6 -apple-system, sans-serif;
      z-index: 10;
      min-width: 220px;
      user-select: none;
      transition: opacity 0.3s;
    }
    #controls.hidden { opacity: 0; pointer-events: none; }
    #controls h3 {
      margin: 0 0 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
    }
    .slider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .slider-row label {
      flex: 0 0 90px;
      font-size: 11px;
      color: #aaa;
    }
    .slider-row input[type=range] {
      flex: 1;
      margin: 0 8px;
      accent-color: #e85014;
      height: 3px;
    }
    .slider-row .val {
      flex: 0 0 36px;
      text-align: right;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: #70c430;
    }
    #randBtn {
      width: 100%;
      margin-top: 10px;
      padding: 6px 0;
      background: rgba(232, 80, 20, 0.25);
      border: 1px solid rgba(232, 80, 20, 0.5);
      border-radius: 6px;
      color: #e85014;
      font: 11px -apple-system, sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    #randBtn:hover { background: rgba(232, 80, 20, 0.4); }
    #toggleBtn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 11;
      background: rgba(10, 8, 40, 0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #aaa;
      font: 11px -apple-system, sans-serif;
      padding: 4px 10px;
      cursor: pointer;
      display: block;
    }
    #morphBtn {
      width: 100%;
      margin-top: 6px;
      padding: 6px 0;
      background: rgba(112, 196, 48, 0.2);
      border: 1px solid rgba(112, 196, 48, 0.45);
      border-radius: 6px;
      color: #70c430;
      font: 11px -apple-system, sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    #morphBtn:hover { background: rgba(112, 196, 48, 0.35); }
    #morphBtn.off {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.15);
      color: #666;
    }
  </style>
</head>
<body>

<div id="controls" class="hidden">
  <h3>Flow Controls</h3>
  <div class="slider-row">
    <label>Particles</label>
    <input type="range" id="sNum" min="5" max="300" value="150" step="1">
    <span class="val" id="vNum">150</span>
  </div>
  <div class="slider-row">
    <label>Speed</label>
    <input type="range" id="sSpeed" min="0.2" max="3" value="2" step="0.1">
    <span class="val" id="vSpeed">2.0</span>
  </div>
  <div class="slider-row">
    <label>Trail Length</label>
    <input type="range" id="sTrail" min="10" max="100" value="80" step="1">
    <span class="val" id="vTrail">80</span>
  </div>
  <div class="slider-row">
    <label>Noise Scale</label>
    <input type="range" id="sScale" min="0.0002" max="0.01" value="0.0009" step="0.0001">
    <span class="val" id="vScale">0.0009</span>
  </div>
  <div class="slider-row">
    <label>Turbulence</label>
    <input type="range" id="sTurb" min="1" max="10" value="18" step="1">
    <span class="val" id="vTurb">18</span>
  </div>
  <div class="slider-row">
    <label>Field Drift</label>
    <input type="range" id="sDrift" min="0" max="0.003" value="0" step="0.0001">
    <span class="val" id="vDrift">0</span>
  </div>
  <div class="slider-row">
    <label>Max Width</label>
    <input type="range" id="sWidth" min="4" max="100" value="38" step="1">
    <span class="val" id="vWidth">38</span>
  </div>
  <div class="slider-row">
    <label>Octaves</label>
    <input type="range" id="sOct" min="1" max="8" value="4" step="1">
    <span class="val" id="vOct">4</span>
  </div>
  <div class="slider-row">
    <label>Falloff</label>
    <input type="range" id="sFall" min="0.05" max="0.95" value="0.5" step="0.05">
    <span class="val" id="vFall">0.50</span>
  </div>
  <button id="randBtn">Randomise</button>
  <button id="morphBtn">Auto Morph: On</button>
</div>
<button id="toggleBtn">Controls</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const BG = [26, 23, 82];

const PALETTE = [
  [232,  80,  20],
  [112, 196,  48],
  [255, 255, 255],
  [250, 140,  38],
  [160, 226,  70],
  [232,  80,  20],
  [112, 196,  48],
  [250, 140,  38],
];

// ── Live params ──────────────────────────────────────────
let pNum   = 250;
let pSpeed = 1.8;
let pTrail = 180;
let pScale = 0.09;
let pTurb  = 10;    // kept low — auto-morph stays in low range
let pDrift = 20;     // locked to 0 always
let pWidth = 58;
let pOct   = 12;
let pFall  = 0.5;

let particles       = [];
let zOff            = 0;
let morphTime       = 0;
let burstTimer      = 0;
let autoMorphActive = true;

// Geometry
const RING_R      = 30;  // imaginary circle radius around logo centre
const RING_BUFFER = 400;   // soft-repulsion zone just outside the ring

// Burst cadence
const BURST_INTERVAL = 500;
const BURST_COUNT    = 100;

// ── Auto-morph ────────────────────────────────────────────
// Each param follows its own sine wave with a unique phase so they all
// evolve independently. pDrift is never touched (stays 0).
var MORPH_INC = 0.0076; // per-frame increment (~60 s full cycle at base freq)

function autoMorph() {
  morphTime += MORPH_INC;
  var t = morphTime;

  MORPH_INC = 0.008 + 0.032 * (0.5 + 0.5 * Math.sin(t * 0.7 + 4.90)); // 0.008–0.04 (slow–fast)

  pSpeed = 0.8 + 2.2  * (0.5 + 0.5 * Math.sin(t * 1.7  + 0.00));
  pTrail = Math.round(15 + 75 * (0.5 + 0.5 * Math.sin(t * 1.3  + 1.20)));
  pScale = 0.0004 + 0.0012 * (0.5 + 0.5 * Math.sin(t * 1.0  + 2.40));
  pTurb  = 16  + 2   * (0.5 + 0.5 * Math.sin(t * 1.5  + 0.70)); // 6–28 (low)
  pWidth = Math.round(10 + 32 * (0.5 + 0.5 * Math.sin(t * 1.8  + 3.10)));
  var newOct  = Math.round(2 + 3 * (0.5 + 0.5 * Math.sin(t * 0.8  + 1.80)));
  var newFall = 0.25 + 0.4  * (0.5 + 0.5 * Math.sin(t * 0.9  + 4.20));

  if (newOct !== pOct || Math.abs(newFall - pFall) > 0.005) {
    pOct  = newOct;
    pFall = newFall;
    noiseDetail(pOct, pFall);
  }
  pDrift = 0; // hard-lock

  // Mirror into slider UI (setting .value does NOT fire 'input' events)
  syncUI('sSpeed', 'vSpeed', pSpeed,              pSpeed.toFixed(1));
  syncUI('sTrail', 'vTrail', pTrail,              pTrail);
  syncUI('sScale', 'vScale', pScale,              pScale.toFixed(4));
  syncUI('sTurb',  'vTurb',  Math.round(pTurb),  Math.round(pTurb));
  syncUI('sWidth', 'vWidth', pWidth,              pWidth);
  syncUI('sOct',   'vOct',   pOct,               pOct);
  syncUI('sFall',  'vFall',  pFall,              pFall.toFixed(2));
  syncUI('sDrift', 'vDrift', 0,                  '0');
}

function syncUI(sliderId, valId, sliderVal, displayVal) {
  var sl = document.getElementById(sliderId);
  var vl = document.getElementById(valId);
  if (sl) sl.value = sliderVal;
  if (vl) vl.textContent = displayVal;
}

// ── Particle factory ─────────────────────────────────────
function makeStrokeWidth() {
  var r = random();
  if (r < 0.30) return random(1, 2.5);
  if (r < 0.55) return random(2.5, 6);
  if (r < 0.75) return random(6, max(7, pWidth * 0.4));
  if (r < 0.90) return random(max(7, pWidth * 0.4), max(8, pWidth * 0.7));
  return random(max(8, pWidth * 0.7), pWidth);
}

// All particles are born on the ring. Burst ones get an outward radial kick.
function spawn(burst) {
  var angle = random(TAU);
  var cx = windowWidth  / 2;
  var cy = windowHeight / 2;
  var x  = cx + cos(angle) * RING_R;
  var y  = cy + sin(angle) * RING_R;

  var p = {
    x: x, y: y,
    trail:  [{ x: x, y: y }],
    sw:     burst ? random(1, 3) : makeStrokeWidth(),
    col:    random(PALETTE),
    bright: random(0.75, 1.0)
  };

  if (burst) {
    var spd = (2.0 + random(2.5)) * pSpeed;
    p.vx = cos(angle) * spd;
    p.vy = sin(angle) * spd;
  }
  return p;
}

function adjustCount() {
  while (particles.length < pNum) particles.push(spawn(false));
  while (particles.length > pNum) particles.pop();
}

// ── Slider wiring (user can still drag to momentarily override) ──
function wireSlider(id, valId, setter) {
  var el = document.getElementById(id);
  var vl = document.getElementById(valId);
  el.addEventListener('input', function() {
    var v = parseFloat(el.value);
    vl.textContent = v % 1 === 0 ? v : v.toFixed(4).replace(/0+$/, '').replace(/\.$/, '.0');
    setter(v);
  });
}

window.addEventListener('DOMContentLoaded', function() {
  wireSlider('sNum',   'vNum',   function(v) { pNum = v; adjustCount(); });
  wireSlider('sSpeed', 'vSpeed', function(v) { pSpeed = v; });
  wireSlider('sTrail', 'vTrail', function(v) { pTrail = v; });
  wireSlider('sScale', 'vScale', function(v) { pScale = v; });
  wireSlider('sTurb',  'vTurb',  function(v) { pTurb  = v; });
  wireSlider('sDrift', 'vDrift', function()  { pDrift = 0; }); // ignored
  wireSlider('sWidth', 'vWidth', function(v) { pWidth = v; });
  wireSlider('sOct',   'vOct',   function(v) { pOct   = v; noiseDetail(pOct, pFall); });
  wireSlider('sFall',  'vFall',  function(v) { pFall  = v; noiseDetail(pOct, pFall); });

  // Initialise displays
  syncUI('sNum',   'vNum',   pNum,   pNum);
  syncUI('sDrift', 'vDrift', 0,      '0');
  document.getElementById('sDrift').disabled = true;

  var panel = document.getElementById('controls');
  var btn   = document.getElementById('toggleBtn');

  function togglePanel() {
    panel.classList.toggle('hidden');
    btn.style.display = panel.classList.contains('hidden') ? 'block' : 'none';
  }
  btn.addEventListener('click', togglePanel);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'h' || e.key === 'H') togglePanel();
  });

  document.getElementById('morphBtn').addEventListener('click', function() {
    autoMorphActive = !autoMorphActive;
    this.textContent = 'Auto Morph: ' + (autoMorphActive ? 'On' : 'Off');
    this.classList.toggle('off', !autoMorphActive);
  });

  document.getElementById('randBtn').addEventListener('click', function() {
    // Jump the morph to a random phase and reseed noise
    morphTime = Math.random() * 6283;
    noiseSeed(Math.floor(Math.random() * 100000));
    zOff = 0;
    particles = [];
    for (var i = 0; i < pNum; i++) particles.push(spawn(false));
  });
});

// ── P5 Setup ─────────────────────────────────────────────
function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(RGB, 255, 255, 255, 255);
  noiseSeed(floor(random(100000)));
  noiseDetail(pOct, pFall);
  for (var i = 0; i < pNum; i++) particles.push(spawn(false));
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }

function mousePressed() {
  var panel = document.getElementById('controls');
  if (panel && !panel.classList.contains('hidden')) {
    var r = panel.getBoundingClientRect();
    if (mouseX >= r.left && mouseX <= r.right && mouseY >= r.top && mouseY <= r.bottom) return;
  }
  noiseSeed(floor(random(100000)));
  morphTime = Math.random() * 6283;
  zOff = 0;
  particles = [];
  for (var i = 0; i < pNum; i++) particles.push(spawn(false));
}

// ── Main Draw Loop ───────────────────────────────────────
function draw() {
  background(BG[0], BG[1], BG[2]);

  if (autoMorphActive) autoMorph();

  var cx = windowWidth  / 2;
  var cy = windowHeight / 2;

  // Periodic burst of fresh particles shooting outward from the ring
  burstTimer++;
  if (burstTimer >= BURST_INTERVAL) {
    burstTimer = 0;
    for (var b = 0; b < BURST_COUNT; b++) particles.push(spawn(true));
    while (particles.length > pNum + BURST_COUNT * 30) particles.shift();
  }

  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];

    // Distance from centre
    var dx   = p.x - cx;
    var dy   = p.y - cy;
    var dist = Math.sqrt(dx * dx + dy * dy) || 0.001;

    // Flow field step
    var a     = noise(p.x * pScale, p.y * pScale, zOff) * TAU * pTurb;
    var flowX = cos(a) * pSpeed;
    var flowY = sin(a) * pSpeed;

    // ── Soft repulsion within the buffer zone ────────────
    // t = 1 right at the ring surface, 0 at the outer edge of the buffer.
    // Blends the flow direction with a pure outward push.
    if (dist < RING_R + RING_BUFFER) {
      var t      = 1 - Math.max(0, (dist - RING_R) / RING_BUFFER);
      var repelX = (dx / dist) * pSpeed * 3.5;
      var repelY = (dy / dist) * pSpeed * 3.5;
      flowX = flowX * (1 - t) + repelX * t;
      flowY = flowY * (1 - t) + repelY * t;
    }

    // Apply movement
    if (p.vx !== undefined) {
      p.x  += flowX * 0.55 + p.vx;
      p.y  += flowY * 0.55 + p.vy;
      p.vx *= 0.91;
      p.vy *= 0.91;
      if (Math.abs(p.vx) < 0.05 && Math.abs(p.vy) < 0.05) { delete p.vx; delete p.vy; }
    } else {
      p.x += flowX;
      p.y += flowY;
    }

    // ── Hard clamp — particles can never cross inside the ring ──
    var ndx  = p.x - cx;
    var ndy  = p.y - cy;
    var ndist = Math.sqrt(ndx * ndx + ndy * ndy) || 0.001;
    if (ndist < RING_R) {
      var sc = RING_R / ndist;
      p.x = cx + ndx * sc;
      p.y = cy + ndy * sc;
      // Correct the last trail point so the trail doesn't pierce the ring
      p.trail[p.trail.length - 1] = { x: p.x, y: p.y };
    }

    p.trail.push({ x: p.x, y: p.y });
    while (p.trail.length > pTrail) p.trail.shift();

    if (p.x < -100 || p.x > width + 100 || p.y < -100 || p.y > height + 100) {
      particles[i] = spawn(false);
      continue;
    }

    drawTrail(p);
  }

  // pDrift is always 0 so zOff never advances — field is static in time
}

// ── Drawing ──────────────────────────────────────────────
function drawTrail(p) {
  var trail = p.trail;
  var n = trail.length;
  if (n < 2) return;

  var r  = p.col[0] * p.bright;
  var g  = p.col[1] * p.bright;
  var b  = p.col[2] * p.bright;
  var sw = min(p.sw, pWidth);

  var ctx = drawingContext;
  ctx.save();
  ctx.strokeStyle = 'rgb(' + floor(r) + ',' + floor(g) + ',' + floor(b) + ')';
  ctx.lineWidth   = sw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  ctx.beginPath();
  ctx.moveTo(trail[0].x, trail[0].y);

  if (n === 2) {
    ctx.lineTo(trail[1].x, trail[1].y);
  } else {
    var mx = (trail[0].x + trail[1].x) * 0.5;
    var my = (trail[0].y + trail[1].y) * 0.5;
    ctx.lineTo(mx, my);
    for (var j = 1; j < n - 1; j++) {
      var ex = (trail[j].x + trail[j + 1].x) * 0.5;
      var ey = (trail[j].y + trail[j + 1].y) * 0.5;
      ctx.quadraticCurveTo(trail[j].x, trail[j].y, ex, ey);
    }
    ctx.lineTo(trail[n - 1].x, trail[n - 1].y);
  }

  ctx.stroke();
  ctx.restore();
}
</script>
